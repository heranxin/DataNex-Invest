<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 数境智投</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            background: #7db4e6;
        }
        .glass {
            background: rgba(255,255,255,0.55);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.13), 0 1.5px 8px 0 #7db4e6;
            border: 1.5px solid #e3eaf5;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }
        .submit-btn {
            background: linear-gradient(90deg, #5fa8e6 0%, #409eff 100%);
            color: #fff;
            border-radius: 0.75rem;
            transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
            box-shadow: 0 2px 8px 0 rgba(64,158,255,0.10);
        }
        .submit-btn:hover {
            background: linear-gradient(90deg, #409eff 0%, #5fa8e6 100%);
            box-shadow: 0 4px 16px 0 rgba(64,158,255,0.18);
            transform: translateY(-2px) scale(1.01);
        }
        .input-style {
            border-radius: 0.75rem;
            border: 1.5px solid #e0e7ef;
            background: #f8fafc;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .input-style:focus {
            border: 1.5px solid #409eff;
            background: #fff;
            box-shadow: 0 0 0 2px #b3d8fa;
        }
        .icon-gradient {
            background: linear-gradient(135deg, #409eff 0%, #7db4e6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: float 2.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="glass max-w-md w-full p-10 mx-2 relative z-10">
        <div class="text-center mb-8">
            <i class="fa fa-lock text-5xl icon-gradient mb-2"></i>
            <h1 class="text-3xl font-extrabold text-teal-700 mb-2 tracking-wide">设置新密码</h1>
            <p class="text-gray-500">请输入您的新密码</p>
        </div>
        <form method="post" autocomplete="off">
            <div class="mb-6">
                <label for="new_password" class="block text-gray-600 mb-2">新密码</label>
                <input type="password" id="new_password" name="new_password" required class="input-style w-full px-4 py-3 focus:outline-none" placeholder="请输入新密码">
            </div>
            <div class="mb-6">
                <label for="confirm_password" class="block text-gray-600 mb-2">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" required class="input-style w-full px-4 py-3 focus:outline-none" placeholder="请再次输入新密码">
            </div>
            {% if error %}
            <div class="mb-4 text-red-500 text-sm text-center">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="mb-4 text-green-500 text-sm text-center">{{ success }}</div>
            {% endif %}
            <button type="submit" class="submit-btn w-full py-3 text-lg font-semibold mt-2 shadow-md">重置密码</button>
        </form>
        <div class="mt-6 text-center text-gray-500 text-sm">
            <a href="{{ url_for('login') }}" class="text-teal-500 hover:underline">
                <i class="fa fa-arrow-left mr-1"></i>返回登录
            </a>
        </div>
    </div>

    <script>
        // 密码确认验证
        document.getElementById('confirm_password').addEventListener('input', function() {
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = this.value;
            
            if (newPassword !== confirmPassword) {
                this.setCustomValidity('两次输入的密码不一致');
            } else {
                this.setCustomValidity('');
            }
        });
    </script>
</body>
</html>
