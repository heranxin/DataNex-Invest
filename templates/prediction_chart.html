<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>预测图表 - {{ stock_code }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #00B5AD;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-3xl mx-auto bg-white shadow-lg rounded-lg p-6">
        <h1 class="text-2xl font-bold mb-4">股票代码: {{ stock_code }}</h1>
        <div class="mb-4">
            <button onclick="window.history.back()" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">返回</button>
        </div>
        <div id="chartContainer" class="flex justify-center items-center h-full">
            <div class="loading-container">
                <div class="loading-spinner"></div>
            </div>
            <img id="chartImage" src="" alt="预测图表加载中..." class="w-full max-w-3xl h-auto hidden">
        </div>
    </div>
    <script>
        const chartImage = document.getElementById('chartImage');
        function showLoading() {
            document.querySelector('.loading-container').style.display = 'flex';
            chartImage.classList.add('hidden');
        }
        function hideLoading() {
            document.querySelector('.loading-container').style.display = 'none';
            chartImage.classList.remove('hidden');
        }
        function loadPredictionChart() {
            showLoading();
            chartImage.src = `/api/prediction-chart?code={{ stock_code }}`;
            chartImage.onload = () => {
                hideLoading();
            };
            chartImage.onerror = () => {
                alert('预测图表加载失败');
                hideLoading();
            };
        }
        window.onload = loadPredictionChart;
    </script>
</body>
</html>
